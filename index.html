<style>
:root{--blue:#1a5fa8;--darkblue:#042c53;--midblue:#0c3d6e;--red:#e34948;--amber:#eda100;--green:#1baf7a;--teal:#0f6e56;--purple:#4a3aa7;--border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.15);--text:#0b0b0b;--text-sec:#52514e;--text-muted:#898781;--radius:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Microsoft JhengHei","PingFang TC",sans-serif;background:#f0efec;color:var(--text);min-height:100vh}

/* Header */
.app-header{background:linear-gradient(135deg,#042c53,#1a5fa8);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:10px;box-shadow:0 2px 12px rgba(4,44,83,0.3)}
.app-left{display:flex;align-items:center;gap:10px}
.app-logo{width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.app-logo svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}
.app-title{font-size:15px;font-weight:600;color:#fff;letter-spacing:-0.2px}
.month-badge{font-size:11px;font-weight:500;background:rgba(255,255,255,0.2);color:#fff;padding:3px 10px;border-radius:999px;border:0.5px solid rgba(255,255,255,0.3);white-space:nowrap}
.upload-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:6px 12px;border-radius:var(--radius);border:0.5px solid rgba(255,255,255,0.4);background:rgba(255,255,255,0.15);color:#fff;cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0}
.upload-btn:hover{background:rgba(255,255,255,0.25)}
input[type=file]{display:none}

/* Cloud bar */
.cloud-bar{background:#fff;border-bottom:0.5px solid var(--border);padding:8px 1.5rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cloud-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:6px 14px;border-radius:var(--radius);border:none;cursor:pointer;font-weight:500;white-space:nowrap}
.btn-load{background:#1a5fa8;color:#fff}
.btn-save{background:#1baf7a;color:#fff}
.btn-settings{background:#f7f7f5;color:var(--text-sec);border:0.5px solid var(--border-strong)}
.cloud-status{font-size:12px;color:var(--text-muted)}

/* Tabs */
.tab-bar{background:#f8fafd;border-bottom:2px solid #e0ecf8;padding:0 1.5rem;display:flex;overflow-x:auto;gap:0}
.tab-btn{font-size:13px;font-weight:500;padding:11px 16px;border:none;background:none;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab-btn.active{color:#0c3d6e;border-bottom-color:#0c3d6e;font-weight:600}

/* Container */
.container{max-width:1100px;margin:0 auto;padding:1.25rem 1.5rem 3rem}
.tab-panel{display:none}.tab-panel.active{display:block}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.25rem}
.kpi-card{background:#fff;border-radius:12px;border:0.5px solid var(--border);padding:1rem 1.1rem}
.kpi-lbl{font-size:11px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.kpi-val{font-size:26px;font-weight:700;line-height:1;letter-spacing:-1px}
.kpi-val.blue{color:#0c3d6e}.kpi-val.red{color:var(--red)}.kpi-val.green{color:var(--teal)}.kpi-val.amber{color:var(--amber)}.kpi-val.purple{color:var(--purple)}
.kpi-sub{font-size:11px;color:var(--text-muted);margin-top:4px}

/* Section card */
.card{background:#fff;border-radius:12px;border:0.5px solid var(--border);padding:1.25rem;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--blue);border-radius:2px}
.card-title.red::before{background:var(--red)}
.card-title.amber::before{background:var(--amber)}
.card-title.purple::before{background:var(--purple)}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{text-align:left;padding:7px 8px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid var(--border);background:#f7f7f5;white-space:nowrap}
tbody td{padding:7px 8px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle}
tbody tr:hover td{background:#f7f7f5}
tbody tr.total-row td{background:#e6f1fb;font-weight:600;border-bottom:none}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:999px}
.b-em{background:#fcebeb;color:#a32d2d}
.b-ur{background:#faeeda;color:#854f0b}
.b-cr{background:#EEEDFE;color:#3C3489}
.b-nt{background:#EEEDFE;color:#3C3489}
.b-ip{background:#e6f1fb;color:#185fa5}
.b-op{background:#eaf3de;color:#3b6d11}

/* Detail table */
.detail-table tbody td{font-size:12px;vertical-align:top}
.detail-dx{color:var(--text-sec);font-size:11px;max-width:220px}
.detail-op{font-weight:500;max-width:180px}

/* Rate bar */
.rate-bar{display:flex;align-items:center;gap:16px;margin-bottom:1rem;padding:.85rem 1.25rem;background:#f0f9f4;border-radius:var(--radius);border-left:3px solid var(--green)}
.rate-bar.warn{background:#fef8ed;border-left-color:var(--amber)}
.rate-bar.danger{background:#fef0f0;border-left-color:var(--red)}
.rate-val{font-size:22px;font-weight:700;color:var(--green)}
.rate-bar.warn .rate-val{color:var(--amber)}
.rate-bar.danger .rate-val{color:var(--red)}

/* Quarter upload */
.q-upload-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:1rem}
.q-upload-item{display:flex;flex-direction:column;gap:6px}
.q-upload-item label.inner{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:8px 12px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:#f7f7f5;color:var(--text-sec);cursor:pointer}
.q-upload-item label.inner:hover{background:#efefed}
.q-lbl{font-size:12px;color:var(--text-muted);font-weight:500}

/* Drop zone */
.drop-zone{border:2px dashed var(--border-strong);border-radius:12px;padding:2.5rem;text-align:center;cursor:pointer;margin-bottom:1.25rem}
.drop-zone:hover,.drop-zone.drag{border-color:var(--blue);background:#f0f7ff}
.drop-zone p{color:var(--text-sec);font-size:13px;margin-top:.5rem}
.drop-zone strong{color:var(--blue)}
.state-empty{text-align:center;padding:2.5rem;color:var(--text-muted);font-size:14px}
.q-sel-btn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:999px;border:1px solid var(--border-strong);background:#fff;color:var(--text-sec);cursor:pointer;transition:all .15s}
.q-sel-btn.active{background:#0c3d6e;color:#fff;border-color:#0c3d6e}
.q-sel-btn:hover:not(.active){background:#f0f4f8}
.no-data{text-align:center;padding:1.5rem;color:var(--text-muted);font-size:13px;background:#f7f7f5;border-radius:var(--radius)}

/* Modal */
.modal-wrap{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border-radius:12px;padding:1.5rem;max-width:420px;width:100%}
.modal h2{font-size:16px;font-weight:600;margin-bottom:.5rem}
.modal p{font-size:13px;color:var(--text-sec);margin-bottom:1rem}
.modal-field{margin-bottom:.75rem}
.modal-field label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px}
.modal-field input{width:100%;padding:8px 10px;border:0.5px solid var(--border-strong);border-radius:var(--radius);font-size:13px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn-cancel{padding:7px 16px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:#f7f7f5;cursor:pointer;font-size:13px}
.btn-confirm{padding:7px 16px;border:none;border-radius:var(--radius);background:var(--blue);color:#fff;cursor:pointer;font-size:13px;font-weight:500}

/* Toast */
.toast{display:none;position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#0b0b0b;color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;z-index:9999;white-space:nowrap}

@media(max-width:700px){
  .app-header{padding:0 1rem;height:auto;padding-top:8px;padding-bottom:8px;flex-wrap:wrap}
  .container{padding:1rem}
  .tab-bar{padding:0 .5rem}
  .tab-btn{font-size:12px;padding:9px 10px}
  .kpi-val{font-size:20px}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-left">
    <div class="app-logo">
      <svg viewBox="0 0 18 18"><circle cx="9" cy="7" r="4"/><line x1="9" y1="1" x2="9" y2="3"/><line x1="3" y1="3" x2="4.5" y2="4.5"/><line x1="15" y1="3" x2="13.5" y2="4.5"/><line x1="1" y1="7" x2="3" y2="7"/><line x1="17" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="9" y2="14"/><line x1="7" y1="14" x2="11" y2="14"/><line x1="7.5" y1="16" x2="10.5" y2="16"/></svg>
    </div>
    <span class="app-title">手術室業務量月報表</span>
    <span class="month-badge" id="month-badge">請上傳資料</span>
  </div>
  <label class="upload-btn" for="file-main-hdr">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 10V3M5 6l3-3 3 3M3 13h10"/></svg>
    上傳手術病患一覽表
    <input type="file" id="file-main-hdr" accept=".xls,.xlsx">

</header>

<div class="cloud-bar">
  <button class="cloud-btn btn-load" id="btn-load" onclick="loadFromGitHub()">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 8h10M8 4l4 4-4 4"/></svg>
    讀取最新報表
  </button>
  <button class="cloud-btn btn-save" id="btn-save" onclick="saveToGitHub()">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13 13H3M8 2v8M5 7l3 3 3-3"/></svg>
    儲存到雲端
  </button>
  <button class="cloud-btn btn-settings" onclick="showSettings()">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M11.4 4.6l-1.4 1.4M4.6 11.4l-1.4 1.4"/></svg>
    設定 GitHub Token
  </button>
  <button class="cloud-btn" id="btn-export" onclick="exportExcel()" style="background:#4a3aa7;color:#fff;display:none">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 13h8M8 2v8M5 9l3 3 3-3"/></svg>
    匯出 Excel
  </button>
  <span class="cloud-status" id="cloud-status"></span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('monthly')">📋 當月業務量</button>
  <button class="tab-btn" onclick="switchTab('critical')">🔴 危急手術</button>
  <button class="tab-btn" onclick="switchTab('urgent')">🟡 緊急手術</button>
  <button class="tab-btn" onclick="switchTab('quarter')">📅 季報表</button>
  <button class="tab-btn" onclick="switchTab('annual')">📆 年度報表</button>
</div>

<div class="container">

  <!-- 當月業務量 -->
  <div id="tab-monthly" class="tab-panel active">
    <label class="drop-zone" id="drop-zone" for="file-main2">
      <div style="font-size:2.5rem;margin-bottom:.5rem">📂</div>
      <strong>點擊或拖曳上傳「手術病患一覽表」</strong>
      <p>支援 .xls / .xlsx　·　自動排除產房（DR）</p>
      <input type="file" id="file-main2" accept=".xls,.xlsx" style="display:none">
    </label>
    <div class="state-empty" id="monthly-empty">尚未載入資料</div>
    <div id="monthly-content" style="display:none"></div>
  </div>

  <!-- 危急手術 -->
  <div id="tab-critical" class="tab-panel">
    <div id="critical-content"><div class="state-empty">請先上傳手術病患一覽表</div></div>

/* ── PARSE FILE ── */
function parseFile(arrayBuffer){
  const wb=XLSX.read(arrayBuffer,{type:'array'});
  const sh=wb.SheetNames.find(s=>s.includes('手術'))||wb.SheetNames[1]||wb.SheetNames[0];
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,defval:''});
  let hdr=0;
  for(let i=0;i<rows.length;i++){if(rows[i].includes('手術日期')){hdr=i;break;}}
  const H=rows[hdr],col=n=>H.indexOf(n);
  const iDate=col('手術日期'),iRoom=col('房間'),iType=col('手術別'),iAnes=col('麻醉方式');
  const iDept=col('科別名稱'),iMrn=col('病歷號'),iName=col('病患姓名');
  const iOp=col('主手術名稱'),iDoctor=col('主刀醫師');
  const iWait=col('到達等候室時間'),iIn=col('進手術室時間'),iOut=col('出手術室時間');

  let data=rows.slice(hdr+1)
    .filter(r=>r[iDate]&&String(r[iDate]).length>=7)
    .filter(r=>String(r[iRoom]||'').trim().toUpperCase()!=='DR');

  function pDT(s){if(!s)return null;const m=String(s).trim().match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);return m?{d:+m[3],h:+m[4],mi:+m[5]}:null;}
  function isNight(row){const o=pDT(row[iOut]);return o?o.h<8:false;}
  function anesT(s){s=String(s||'');if(s.startsWith('F-Local')||s.startsWith('J-眼科'))return'local';if(['A-General','I-Mask GA','E-Other','H-IVG','B-Spinal','C-Epidural'].includes(s))return'gen';return'other';}
  function anesLabel(s){s=String(s||'');if(s==='A-General'||s==='I-Mask GA')return'全身麻醉';if(s==='B-Spinal')return'脊髓麻醉';if(s==='C-Epidural')return'硬膜外';if(s==='H-IVG')return'靜脈麻醉';if(s.startsWith('F-Local'))return'局部麻醉';if(s.startsWith('J-眼科'))return'眼科局麻';return s||'-';}
  function waitMins(row){const t1=pDT(row[iWait]),t2=pDT(row[iIn]);if(!t1||!t2)return null;const diff=(t2.h*60+t2.mi)-(t1.h*60+t1.mi);return diff<0?diff+1440:diff;}
  function fmtDate(s){s=String(s||'').replace(/\.0$/,'');if(s.length===7){const yr=parseInt(s.slice(0,3))+1911;return`${yr}/${parseInt(s.slice(3,5))}/${parseInt(s.slice(5,7))}`;}return s;}

  const fd=String(data[0]?.[iDate]||'');
  const month=`${fd.slice(0,3)}年${parseInt(fd.slice(3,5)||0)}月`;

  let total=0,emg=0,urgent=0,critical=0,inpatient=0,outpatient=0,gen=0,loc=0,nightTotal=0;
  const deptMap={};
  const critRows=[],urgRows=[];

  data.forEach(row=>{
    total++;
    const t=String(row[iType]||'');
    if(t==='急診手術')emg++;
    else if(t==='緊急手術')urgent++;
    else if(t==='危急手術')critical++;
    else if(t==='住院手術')inpatient++;
    else if(t==='門診手術')outpatient++;
    const a=anesT(row[iAnes]);
    if(a==='gen')gen++;else if(a==='local')loc++;
    if(isNight(row))nightTotal++;
    const dept=String(row[iDept]||'未知');
    if(!deptMap[dept])deptMap[dept]={name:dept,total:0,emg:0,urgent:0,crit:0,inpatient:0,outpatient:0,gen:0,loc:0,night:0,night_gen:0,night_loc:0};
    deptMap[dept].total++;
    if(t==='急診手術')deptMap[dept].emg++;
    else if(t==='緊急手術')deptMap[dept].urgent++;
    else if(t==='危急手術')deptMap[dept].crit++;
    else if(t==='住院手術')deptMap[dept].inpatient++;
    else if(t==='門診手術')deptMap[dept].outpatient++;
    if(a==='gen')deptMap[dept].gen++;
    if(a==='local')deptMap[dept].loc++;
    if(isNight(row)){
      deptMap[dept].night++;
      if(a==='gen')deptMap[dept].night_gen++;
      else if(a==='local')deptMap[dept].night_loc++;
    }
    if(t==='危急手術'||t==='緊急手術'){
      const wm=waitMins(row);
      const rec={date:fmtDate(row[iDate]),dept,mrn:String(row[iMrn]||''),name:String(row[iName]||''),op:String(row[iOp]||'').trim(),anes:anesLabel(row[iAnes]),waitMins:wm,doctor:String(row[iDoctor]||'')};
      if(t==='危急手術'){rec.over=wm!==null&&wm>=30;critRows.push(rec);}
      else{rec.over=wm!==null&&wm>=120;urgRows.push(rec);}
    }
  });

  const critOk=critRows.filter(r=>!r.over).length;
  const urgOk=urgRows.filter(r=>!r.over).length;
  const critRate=critRows.length>0?(critOk/critRows.length*100).toFixed(1):null;
  const urgRate=urgRows.length>0?(urgOk/urgRows.length*100).toFixed(1):null;

  const nightGen = Object.values(deptMap).reduce((s,r)=>s+r.night_gen,0);
  const nightLoc = Object.values(deptMap).reduce((s,r)=>s+r.night_loc,0);
  return{month,total,emg,urgent,critical,inpatient,outpatient,gen,loc,night_total:nightTotal,night_gen:nightGen,night_loc:nightLoc,dept:Object.values(deptMap),critRows,urgRows,critRate,critOk,urgRate,urgOk};
}

        <tbody>
          ${dSorted.map(r=>`<tr>

          <tr class="total-row"><td>合　計</td><td class="num">${d.total}</td>

/* ── PROCESS MAIN FILE ── */
function processMain(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=parseFile(ev.target.result);
      window._reportData=d;
      renderMonthly(d);
      renderCritical(d.critRows,d.critRate,d.critOk);
      renderUrgent(d.urgRows,d.urgRate,d.urgOk);
      showToast('✓ '+d.month+' 資料載入完成');
    }catch(e){alert('解析失敗：'+e.message);}
  };
  reader.readAsArrayBuffer(file);
}

/* ── QUARTER ── */
const qData={1:null,2:null,3:null};
let currentQ = 1;
const Q_MONTHS = {
  1: ['1月','2月','3月'],
  2: ['4月','5月','6月'],
  3: ['7月','8月','9月'],
  4: ['10月','11月','12月']
};

function selectQuarter(q){
  currentQ = q;
  // 更新按鈕樣式
  document.querySelectorAll('.q-sel-btn').forEach((b,i)=>{b.classList.toggle('active',i===q-1);});
  // 更新月份標籤
  const months = Q_MONTHS[q];
  document.getElementById('q-month-labels').textContent = `上傳 ${months[0]}、${months[1]}、${months[2]} 的手術病患一覽表`;
  document.getElementById('q1-lbl').textContent = months[0];
  document.getElementById('q2-lbl').textContent = months[1];
  document.getElementById('q3-lbl').textContent = months[2];
  // 清空已上傳的資料
  qData[1]=null;qData[2]=null;qData[3]=null;
  ['q1-name','q2-name','q3-name'].forEach(id=>document.getElementById(id).textContent='選擇 XLS/XLSX');
  document.getElementById('quarter-content').innerHTML='';
}
function handleQ(n,input){
  const file=input.files[0];if(!file)return;
  document.getElementById('q'+n+'-name').textContent=file.name;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=parseFile(ev.target.result);
      qData[n]=d;
      tryMergeQuarter();
    }catch(e){alert('第'+n+'個月解析失敗：'+e.message);}
  };
  reader.readAsArrayBuffer(file);
}
function tryMergeQuarter(){
  const loaded=[1,2,3].filter(i=>qData[i]);
  if(loaded.length===0)return;
  const months=loaded.map(i=>qData[i].month).join('、');
  const qLabel=`Q${currentQ}（${Q_MONTHS[currentQ].join('、')}）`;
  let total=0,emg=0,urgent=0,critical=0,inpatient=0,outpatient=0,gen=0,loc=0,night=0;
  const dm={};
  loaded.forEach(i=>{
    const d=qData[i];
    total+=d.total;emg+=d.emg;urgent+=d.urgent;critical+=d.critical;
    inpatient+=d.inpatient;outpatient+=d.outpatient;gen+=d.gen;loc+=d.loc;night+=d.night_total;
    d.dept.forEach(r=>{
      if(!dm[r.name])dm[r.name]={name:r.name,total:0,emg:0,urgent:0,crit:0,inpatient:0,outpatient:0,gen:0,loc:0,night:0};
      const m=dm[r.name];
      m.total+=r.total;m.emg+=r.emg;m.urgent+=r.urgent;m.crit+=r.crit;
      m.inpatient+=r.inpatient;m.outpatient+=r.outpatient;m.gen+=r.gen;m.loc+=r.loc;m.night+=r.night;
    });
  });
  renderQuarter({qLabel,months,total,emg,urgent,critical,inpatient,outpatient,gen,loc,night_total:night,dept:Object.values(dm),monthData:loaded.map(i=>qData[i])});
}

/* ── GITHUB SYNC ── */
const REPO_FILE='data/report.json';
const Q_FILE_PREFIX='data/quarter_';

async function saveToGitHub(){
  const s=getSettings();
  if(!s.token){showSettings();return;}
  const isQ=document.querySelector('.tab-btn.active').textContent.includes('季');
  const data=isQ?window._quarterData:window._reportData;
  const qKey=isQ&&window._quarterData?`Q${currentQ}`:'';  const file=isQ?`${Q_FILE_PREFIX}q${currentQ}.json`:REPO_FILE;
  if(!data){showToast('⚠ 請先上傳資料');return;}
  const btn=document.getElementById('btn-save');
  btn.textContent='儲存中…';btn.disabled=true;
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    const apiUrl=`https://api.github.com/repos/${s.user}/${s.repo}/contents/${file}`;
    let sha='';
    try{const r=await fetch(apiUrl,{headers:{'Authorization':'token '+s.token,'Accept':'application/vnd.github.v3+json'}});if(r.ok){const j=await r.json();sha=j.sha;}}catch(e){}
    const body={message:`更新${isQ?'季':'月'}報表 ${isQ?data.months:data.month}`,content};
    if(sha)body.sha=sha;
    const res=await fetch(apiUrl,{method:'PUT',headers:{'Authorization':'token '+s.token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify(body)});
    if(res.ok){
      showToast('✓ 已儲存到雲端！手機可同步查看');
      // 月報表 → 累積年報表
      if(!isQ && window._reportData){
        const annual = mergeMonthToAnnual(window._reportData);
        await saveAnnualToGitHub(annual);
      }
      // 季報表 → 累積年報表（用季資料）
      if(isQ && window._quarterData){
        const annual = mergeQuarterToAnnual(window._quarterData, currentQ);
        await saveAnnualToGitHub(annual);
        showToast(`✓ Q${currentQ} 已儲存，年度報表已更新`);
      }
      const bexp=document.getElementById('btn-export');
      if(bexp) bexp.style.display='inline-flex';
    }
    else{const e=await res.json();showToast('✗ 儲存失敗：'+(e.message||res.status));}
  }catch(e){showToast('✗ 網路錯誤：'+e.message);}
  btn.textContent='儲存到雲端';btn.disabled=false;
}

async function loadFromGitHub(silent=false){
  const s=getSettings();
  const btn=document.getElementById('btn-load');
  if(!silent&&btn){btn.textContent='讀取中…';btn.disabled=true;}
  try{
    const apiUrl=`https://api.github.com/repos/${s.user}/${s.repo}/contents/${REPO_FILE}`;
    const headers={'Accept':'application/vnd.github.v3+json'};
    if(s.token)headers['Authorization']='token '+s.token;
    const res=await fetch(apiUrl,{headers});
    if(res.ok){
      const f=await res.json();
      const d=JSON.parse(decodeURIComponent(escape(atob(f.content.replace(/\n/g,'')))));
      window._reportData=d;
      renderMonthly(d);renderCritical(d.critRows,d.critRate,d.critOk);renderUrgent(d.urgRows,d.urgRate,d.urgOk);
      if(!silent)showToast('✓ 已載入最新報表：'+d.month);
      else showToast('✓ '+d.month+' 報表已自動載入');

  }catch(e){if(!silent)showToast('✗ 錯誤：'+e.message);}

}

function mergeQuarterToAnnual(qData, qNum){
  const yr = qData.months ? qData.months.slice(0,3) : (qData.monthData&&qData.monthData[0]?qData.monthData[0].month.slice(0,3):'115');
  let annual = window._annualData || {year: yr+'年', quarters:{}, months:{}};
  annual.quarters = annual.quarters || {};
  annual.quarters[`Q${qNum}`] = qData;
  // 也把每個月的資料加進 months
  (qData.monthData||[]).forEach(m=>{
    annual.months[m.month] = {
      month:m.month, total:m.total, emg:m.emg, urgent:m.urgent, critical:m.critical,
      inpatient:m.inpatient, outpatient:m.outpatient, gen:m.gen, loc:m.loc, night_total:m.night_total, dept:m.dept
    };
  });
  window._annualData = annual;
  renderAnnual(annual);
  return annual;
}

function mergeMonthToAnnual(monthData){
  // 讀取現有年報表，加入新月份
  let annual = window._annualData || {year: monthData.month.slice(0,3)+'年', months:{}};
  const monthKey = monthData.month;
  annual.months[monthKey] = {
    month:monthData.month, total:monthData.total,
    emg:monthData.emg, urgent:monthData.urgent, critical:monthData.critical,
    inpatient:monthData.inpatient, outpatient:monthData.outpatient,
    gen:monthData.gen, loc:monthData.loc, night_total:monthData.night_total,
    dept:monthData.dept
  };
  window._annualData = annual;
  renderAnnual(annual);
  return annual;
}

function renderAnnual(annual){
  // 優先從 quarters 重建月份列表
  if(annual.quarters){
    Object.values(annual.quarters).forEach(q=>{
      (q.monthData||[]).forEach(m=>{
        if(!annual.months[m.month]) annual.months[m.month]={month:m.month,total:m.total,emg:m.emg,urgent:m.urgent,critical:m.critical,inpatient:m.inpatient,outpatient:m.outpatient,gen:m.gen,loc:m.loc,night_total:m.night_total,dept:m.dept};
      });
    });
  }
  const monthList = Object.values(annual.months).sort((a,b)=>a.month.localeCompare(b.month));
  if(monthList.length===0){
    document.getElementById('annual-content').innerHTML='<div class="state-empty">尚無累積資料</div>';
    return;
  }
  
  // 計算年度合計
  let total=0,emg=0,urgent=0,critical=0,inpatient=0,outpatient=0,gen=0,loc=0,night=0;
  const deptMap={};
  monthList.forEach(m=>{
    total+=m.total;emg+=m.emg;urgent+=m.urgent;critical+=m.critical;
    inpatient+=m.inpatient;outpatient+=m.outpatient;gen+=m.gen;loc+=m.loc;night+=m.night_total;
    (m.dept||[]).forEach(r=>{
      if(!deptMap[r.name])deptMap[r.name]={name:r.name,total:0,emg:0,urgent:0,crit:0,inpatient:0,outpatient:0,gen:0,loc:0,night:0};
      const dm=deptMap[r.name];
      dm.total+=r.total;dm.emg+=r.emg;dm.urgent+=r.urgent;dm.crit+=r.crit;
      dm.inpatient+=r.inpatient;dm.outpatient+=r.outpatient;dm.gen+=r.gen;dm.loc+=r.loc;dm.night+=r.night;
    });
  });
  const dSorted=Object.values(deptMap).sort((a,b)=>b.total-a.total);
  const emgPct=((emg+urgent+critical)/total*100).toFixed(1);

  // 月趨勢表
  const monthRows=monthList.map(m=>`<tr>
    <td>${m.month}</td><td class="num">${m.total}</td>
    <td class="num">${m.inpatient}</td><td class="num">${m.outpatient}</td>
    <td class="num"><span class="badge b-em">${m.emg}</span></td>
    <td class="num"><span class="badge b-cr">${m.critical}</span></td>
    <td class="num"><span class="badge b-ur">${m.urgent}</span></td>
    <td class="num">${m.gen}</td><td class="num">${m.loc}</td>
    <td class="num"><span class="badge b-nt">${m.night_total}</span></td>
  </tr>`).join('');

  document.getElementById('annual-content').innerHTML=`
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">
      ${annual.year} 年度報表　已累積 ${monthList.length} 個月　${annual.quarters?'（'+Object.keys(annual.quarters).join('、')+'）':''}
    </div>
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-lbl">年度總台數</div><div class="kpi-val blue">${total.toLocaleString()}</div><div class="kpi-sub">已排除產房 DR</div></div>
      <div class="kpi-card"><div class="kpi-lbl">住院手術</div><div class="kpi-val green">${inpatient}</div><div class="kpi-sub">${(inpatient/total*100).toFixed(1)}%</div></div>
      <div class="kpi-card"><div class="kpi-lbl">門診手術</div><div class="kpi-val amber">${outpatient}</div><div class="kpi-sub">${(outpatient/total*100).toFixed(1)}%</div></div>
      <div class="kpi-card"><div class="kpi-lbl">急診＋緊急＋危急</div><div class="kpi-val red">${emg+urgent+critical}</div><div class="kpi-sub">佔比 ${emgPct}%</div></div>
      <div class="kpi-card"><div class="kpi-lbl">全身麻醉</div><div class="kpi-val">${gen}</div><div class="kpi-sub">${(gen/total*100).toFixed(1)}%</div></div>
      <div class="kpi-card"><div class="kpi-lbl">局部麻醉</div><div class="kpi-val">${loc}</div><div class="kpi-sub">${(loc/total*100).toFixed(1)}%</div></div>
      <div class="kpi-card"><div class="kpi-lbl">大夜班手術</div><div class="kpi-val purple">${night}</div><div class="kpi-sub">出手術室 08:00 前</div></div>
    </div>
    <div class="card">
      <div class="card-title">各月業務量趨勢</div>
      <div class="table-wrap"><table>
        <thead><tr><th>月份</th><th class="num">總台數</th><th class="num">住院</th><th class="num">門診</th><th class="num">急診</th><th class="num">危急</th><th class="num">緊急</th><th class="num">全麻</th><th class="num">局麻</th><th class="num">大夜班</th></tr></thead>
        <tbody>${monthRows}
          <tr class="total-row"><td>年度合計</td><td class="num">${total}</td>
            <td class="num">${inpatient}</td><td class="num">${outpatient}</td>
            <td class="num"><span class="badge b-em">${emg}</span></td>
            <td class="num"><span class="badge b-cr">${critical}</span></td>
            <td class="num"><span class="badge b-ur">${urgent}</span></td>
            <td class="num">${gen}</td><td class="num">${loc}</td>
            <td class="num"><span class="badge b-nt">${night}</span></td>
          </tr>
        </tbody>
      </table></div>
    </div>
    <div class="card">
      <div class="card-title">各科年度業務量</div>
      <div class="table-wrap"><table>
        <thead><tr><th>科別</th><th class="num">總台數</th><th class="num">住院</th><th class="num">門診</th><th class="num">急診</th><th class="num">危急</th><th class="num">緊急</th><th class="num">全麻</th><th class="num">局麻</th><th class="num">大夜班</th></tr></thead>
        <tbody>
          ${dSorted.map(r=>`<tr>
            <td>${r.name}</td><td class="num">${r.total}</td>
            <td class="num">${r.inpatient>0?`<span class="badge b-ip">${r.inpatient}</span>`:'-'}</td>
            <td class="num">${r.outpatient>0?`<span class="badge b-op">${r.outpatient}</span>`:'-'}</td>
            <td class="num">${r.emg>0?`<span class="badge b-em">${r.emg}</span>`:'-'}</td>
            <td class="num">${r.crit>0?`<span class="badge b-cr">${r.crit}</span>`:'-'}</td>
            <td class="num">${r.urgent>0?`<span class="badge b-ur">${r.urgent}</span>`:'-'}</td>
            <td class="num">${r.gen}</td><td class="num">${r.loc}</td>
            <td class="num">${r.night>0?`<span class="badge b-nt">${r.night}</span>`:'-'}</td>
          </tr>`).join('')}
          <tr class="total-row"><td>合計</td><td class="num">${total}</td>
            <td class="num">${inpatient}</td><td class="num">${outpatient}</td>
            <td class="num"><span class="badge b-em">${emg}</span></td>
            <td class="num"><span class="badge b-cr">${critical}</span></td>
            <td class="num"><span class="badge b-ur">${urgent}</span></td>
            <td class="num">${gen}</td><td class="num">${loc}</td>
            <td class="num"><span class="badge b-nt">${night}</span></td>
          </tr>
        </tbody>
      </table></div>
    </div>`;
  
  window._annualData = annual;
  // 顯示匯出按鈕
  const bexp=document.getElementById('btn-export');
  if(bexp) bexp.style.display='inline-flex';
}

function exportAnnualExcel(annual){
  const wb = XLSX.utils.book_new();
  // 優先從 quarters 重建月份列表
  if(annual.quarters){
    Object.values(annual.quarters).forEach(q=>{
      (q.monthData||[]).forEach(m=>{
        if(!annual.months[m.month]) annual.months[m.month]={month:m.month,total:m.total,emg:m.emg,urgent:m.urgent,critical:m.critical,inpatient:m.inpatient,outpatient:m.outpatient,gen:m.gen,loc:m.loc,night_total:m.night_total,dept:m.dept};
      });
    });
  }
  const monthList = Object.values(annual.months).sort((a,b)=>a.month.localeCompare(b.month));
  
  // 各月趨勢
  const monthData=[['月份','總台數','住院','門診','急診','危急','緊急','全麻','局麻','大夜班']];
  let tot=0,ip=0,op=0,em=0,cr=0,ur=0,gn=0,lc=0,nt=0;
  monthList.forEach(m=>{
    monthData.push([m.month,m.total,m.inpatient,m.outpatient,m.emg,m.critical,m.urgent,m.gen,m.loc,m.night_total]);
    tot+=m.total;ip+=m.inpatient;op+=m.outpatient;em+=m.emg;cr+=m.critical;ur+=m.urgent;gn+=m.gen;lc+=m.loc;nt+=m.night_total;
  });
  monthData.push(['年度合計',tot,ip,op,em,cr,ur,gn,lc,nt]);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(monthData), '各月趨勢');
  
  XLSX.writeFile(wb, '手術室業務量_'+annual.year+'年報表.xlsx');
  showToast('✓ 年報表 Excel 已匯出');
}

window.addEventListener('load',()=>{
  setTimeout(()=>{loadFromGitHub(true);loadQuarterFromGitHub();loadAnnualFromGitHub();},500);
});
